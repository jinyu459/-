<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jinyu Phone Simulator (网格拖拽防重叠版)</title>
    <!-- 引入外部 CSS -->
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/base.css">
</head>
<body>

    <div class="phone-container">
        <!-- 1. 上半部分：主屏幕区域 -->
        <div class="screen-area" id="screen-area">
            <div class="desktop" id="desktop">
                <!-- 左屏幕 -->
                <div class="home-screen left-screen">
                    <div id="winSys" class="widget-window">
                        <div class="top-frame"></div><div class="bottom-frame"></div><div class="left-frame"></div><div class="right-frame"></div>
                        <div class="page" id="page"></div>
                        <div class="flower-branch" onclick="document.getElementById('winSys').classList.toggle('open')">
                            <div class="branch"></div><div class="leaf"></div><div class="flower"></div>
                        </div>
                        <div id="timeDisplay" class="time-display" onclick="sysData.toggleTimeMode()"></div>
                    </div>

                    <div class="icon-grid" id="icon-grid-left">
                        <div class="icon" id="icon-setting" data-url="apps/setting/setting.html">
                            <div class="icon-box">设置</div><div class="icon-name">设置</div>
                        </div>
                        <div class="icon" id="icon-theme" data-url="apps/theme/theme.html">
                            <div class="icon-box">美化</div><div class="icon-name">美化</div>
                        </div>
                    </div>
                </div>

                <!-- 右屏幕 -->
                <div class="home-screen right-screen">
                    <div class="icon-grid mt-20" id="icon-grid-right">
                        <div class="icon" id="icon-chat" data-url="apps/chat/chat.html">
                            <div class="icon-box">聊天</div><div class="icon-name">聊天</div>
                        </div>
                        <div class="icon" id="icon-worldbook" data-url="apps/worldbook/worldbook.html">
                            <div class="icon-box">世界书</div><div class="icon-name">世界书</div>
                        </div>
                        <div class="icon" id="icon-online" data-url="apps/online/online.html">
                            <div class="icon-box">联机</div><div class="icon-name">联机</div>
                        </div>
                        <div class="icon" id="icon-music" data-url="apps/music/music.html">
                            <div class="icon-box">音乐</div><div class="icon-name">音乐</div>
                        </div>
                        <div class="icon" id="icon-farm" data-url="apps/farm/farm.html">
                            <div class="icon-box">农场</div><div class="icon-name">农场</div>
                        </div>
                        <div class="icon" id="icon-study" data-url="apps/study/study.html">
                            <div class="icon-box">学习</div><div class="icon-name">学习</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div id="toast"></div>
        </div> <!-- screen-area 结束 -->

        <!-- 2. 下半部分：底部 Dock 栏 -->
<div id="dock" class="dock">
    <!-- 左侧按钮：柔美的柳叶 -->
    <button class="dock-btn" onclick="sysData.toggleIconNames()">
        <svg class="leaf-icon" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 3 C 14 3, 7 8, 4 19 C 9 17, 16 12, 21 3 Z" />
            <path d="M21 3 C 15 7, 10 12, 4 19" />
            <path d="M4 19 L 2 22" />
        </svg>
    </button>

    <!-- 中间诗句：绝对居中 -->
    <span id="poem-text">海内存知己，天涯若比邻</span>

    <!-- 右侧按钮：轻盈的线框纸风车 / 飞花 -->
    <button class="dock-btn" onclick="toggleScreen()">
        <svg class="pinwheel-icon" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <!-- 顶部扇叶 -->
            <path d="M 12 12 L 12 3 L 21 3 Q 15 6 12 12 Z" />
            <!-- 右侧扇叶 -->
            <path d="M 12 12 L 21 12 L 21 21 Q 18 15 12 12 Z" />
            <!-- 底部扇叶 -->
            <path d="M 12 12 L 12 21 L 3 21 Q 9 18 12 12 Z" />
            <!-- 左侧扇叶 -->
            <path d="M 12 12 L 3 12 L 3 3 Q 6 9 12 12 Z" />
        </svg>
    </button>
</div>


        <!-- ================= 核心修复位置 ================= -->
        <!-- 3. 绝对定位层：将 app-layer 移到了整个 phone-container 的最后面 -->
        <!-- 这样它的 position: absolute 就能以整个手机为基准，彻底覆盖所有内容 -->
        <div class="app-layer" id="app-layer">
            <iframe id="app-frame" src=""></iframe>
            <button class="home-btn" onclick="closeApp()">一 返回桌面 一</button>
        </div>

    </div> <!-- phone-container 结束 -->

    <!-- 引入外部 JS -->
    <script src="assets/js/dataHub.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/drag.js"></script>
</body>
</html>
